name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest # Sistema operacional
    steps:
      - uses: actions/checkout@v4 # Baixa o código
      - name: Executar Script
        run: echo "Configurado com sucesso!"
        
  validating-html:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: configurar node.js
        uses: actions/setup-node@v4
        with: 
          node-version: '20'
      - name: instalar HTMLHint
        run: npm install -g htmlhint
      - name: Validando htmlhin
        run: htmlhint src/index.html
  
  validating-prettier:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: configurar node.js
        uses: actions/setup-node@v4
        with: 
          node-version: '20'
      - name: instalar Prettier
        run: npm install -g prettier
      - name: Fromatando com Prettier
        run: prettier --write src/index.html src/styles.css
      - name: Verificar mudanças
        run: git diff --exit-code || echo "Arquivos formatados"
  
  validating-links:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: configurar node.js
        uses: actions/setup-node@v4
        with: 
          node-version: '20'
      - name: validando links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --accept 200,201,204,301,302,307,308,403,429,999 src/index.html
  deploy:
    runs-on: ubuntu-latest
    needs: [validating-html, validating-prettier, validating-links]
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACESS_KEY }}
          aws-region: us-east-1
      - name: Deploy S3
        run: aws s3 sync src/ s3://nicollas-santos-pucrs-devops/ --delete