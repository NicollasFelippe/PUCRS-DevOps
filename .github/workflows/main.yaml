name: CI/CD Pipeline

on:
  push:
    branches: [Fase-2-DevOps]

jobs:
  build:
    runs-on: ubuntu-latest # Sistema operacional
    steps:
      - uses: actions/checkout@v4 # Baixa o código
      - name: Executar Script
        run: echo "Configurado com sucesso!"
        
  validating-html:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: configurar node.js
        uses: actions/setup-node@v4
        with: 
          node-version: '20'
      - name: instalar HTMLHint
        run: npm install -g htmlhint
      - name: Validando htmlhin
        run: htmlhint src/index.html
  
  validating-prettier:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: configurar node.js
        uses: actions/setup-node@v4
        with: 
          node-version: '20'
      - name: instalar Prettier
        run: npm install -g prettier
      - name: Validando formato
        run: prettier --check src/index.html src/styles.css

  validating-links:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: validando links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --accept 200,201,204,301,302,307,308,403,429,999 src/index.html
  deploy:
    runs-on: ubuntu-latest
    needs: [validating-html, validating-prettier, validating-links]
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1
      - name: preparando docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: build e push da imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/devops-pucrs-nicollas:latest
      
      - name: Infraestrutura cloudFormation
        run: |
          aws cloudformation deploy \
          --template-file template.yaml \
          --stack-name pilha-site-devops \
          --no-fail-on-empty-changeset